services:
  - type: web
    name: studentworkspace-api
    runtime: java
    runtimeVersion: "21"
    buildCommand: mvn clean install -DskipTests
    startCommand: java -jar target/studentworkspace-0.0.1-SNAPSHOT.jar
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://mysql-baa4dd3-mukunda-bb0a.i.aivencloud.com:26790/defaultdb?ssl-mode=REQUIRED
      - key: SPRING_DATASOURCE_USERNAME
        value: avnadmin
      - key: SPRING_DATASOURCE_PASSWORD
        value: ${SPRING_DATASOURCE_PASSWORD}
        scope: secret
      - key: JWT_SECRET
        value: ${JWT_SECRET}
        scope: secret
      - key: CONTEST_API_USERNAME
        value: mukunda
      - key: CONTEST_API_KEY
        value: ${CONTEST_API_KEY}
        scope: secret
      - key: SERVER_PORT
        value: "8082"
    regions:
      - oregon
