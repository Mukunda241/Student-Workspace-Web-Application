spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

server.port=8082
spring.application.name=studentworkspace

# ===== JWT Configuration =====
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationInMs=86400000

# ===== Swagger/OpenAPI Configuration =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ===== Contest API Configuration =====
contest.api.url=https://clist.by/api/v4/contest/
contest.api.username=${CONTEST_API_USERNAME}
contest.api.key=${CONTEST_API_KEY}
contest.sync.enabled=true
contest.sync.cron=0 0 2 * * ?

# ===== Timezone =====
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jackson.time-zone=Asia/Kolkata
server.timezone=Asia/Kolkata